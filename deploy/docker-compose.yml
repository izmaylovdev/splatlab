# SplatLab — full local control plane in Docker.
#
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Brings up EVERYTHING the control plane needs, containerized:
#   infra   postgres · temporal · temporal-ui · redis · minio (dev S3)
#   app     api (REST/WS + UI) · control (workflow worker) · pool (opt-in)
#
# Open:  UI http://localhost:8000   Temporal UI http://localhost:8233
#        MinIO console http://localhost:9001  (splatlab / splatlab-secret)
#
# Storage is the S3 backend against the in-compose MinIO ("dev S3"): API and the
# control worker exchange artifacts through it, matching the deployed split.
#
# GPU training runs on rented Vast.ai boxes, not in this stack. The control worker
# runs the workflow and dispatches COLMAP/train activities to the `splat-gpu` task
# queue; the `pool` autoscaler rents GPU boxes on demand to poll that queue and
# releases them when idle. A rented box reaches this (laptop-local) control plane
# over ngrok — so training actually completes from your Mac.
#
# The `pool` autoscaler is opt-in — it needs a VAST_API_KEY in deploy/.env, plus
# the ngrok tunnels up: run `bash deploy/ngrok_up.sh` (writes BOX_* into .env), then
#   docker compose -f deploy/docker-compose.yml --profile pool up -d
# Without the pool the stack still runs end-to-end except the GPU steps, which
# wait in the queue.
#
# Config/secrets come from deploy/.env (copy deploy/.env.example). Compose reads
# it automatically because this file lives in deploy/.

services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"        # gRPC — TEMPORAL_ADDRESS
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "temporal:7233"]
      interval: 5s
      timeout: 5s
      retries: 30

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8233:8080"        # Temporal Web UI

  redis:
    image: redis:7-alpine
    # Password-protected: 6379 is exposed on the public static IP.
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in deploy/.env}"]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}      # lets the healthcheck's redis-cli auth
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"        # REDIS_URL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-splatlab}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-splatlab-secret}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"        # S3 API — internal SPLATLAB_S3_ENDPOINT
      - "9001:9001"        # console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- app: control plane -----------------------------------------------------
  # Shared config for the app containers (same image, different role/command).
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: splatlab-app:local
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SPLATLAB_STORAGE: s3
      SPLATLAB_S3_BUCKET: ${SPLATLAB_S3_BUCKET:-splatlab}
      SPLATLAB_S3_ENDPOINT: http://minio:9000          # API ↔ MinIO (in-network)
      SPLATLAB_S3_PUBLIC_ENDPOINT: ${SPLATLAB_S3_PUBLIC_ENDPOINT:-http://localhost:9000}  # browser presigned GETs
      SPLATLAB_S3_REGION: ${SPLATLAB_S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-splatlab}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-splatlab-secret}
    ports:
      - "8000:8000"
    restart: unless-stopped

  control:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: splatlab-app:local
    command: ["python", "-m", "server.worker.main"]
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPLATLAB_WORKER_ROLE: control
      TEMPORAL_ADDRESS: temporal:7233
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SPLATLAB_STORAGE: s3
      SPLATLAB_S3_BUCKET: ${SPLATLAB_S3_BUCKET:-splatlab}
      SPLATLAB_S3_ENDPOINT: http://minio:9000
      SPLATLAB_S3_PUBLIC_ENDPOINT: ${SPLATLAB_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      SPLATLAB_S3_REGION: ${SPLATLAB_S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-splatlab}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-splatlab-secret}
    restart: unless-stopped

  # ---- app: GPU autoscaler (opt-in) ------------------------------------------
  # `docker compose -f deploy/docker-compose.yml --profile pool up -d`.
  # Needs VAST_API_KEY, and the ngrok tunnels up (`bash deploy/ngrok_up.sh`, which
  # writes BOX_* into deploy/.env). The pool talks to Temporal/Redis by service
  # name, but FORWARDS the box-facing BOX_* addresses (the Mac's ngrok public
  # addresses) to each rented box, so the box dials back in and training completes.
  pool:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: splatlab-app:local
    profiles: ["pool"]
    command: ["python", "-m", "server.vast.pool"]
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # The pool's own control-plane connection (in-compose service names).
      TEMPORAL_ADDRESS: temporal:7233
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SPLATLAB_STORAGE: s3
      SPLATLAB_S3_BUCKET: ${SPLATLAB_S3_BUCKET:-splatlab}
      SPLATLAB_S3_REGION: ${SPLATLAB_S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-splatlab}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-splatlab-secret}
      # Box-facing addresses the pool FORWARDS to each rented box — the Mac's ngrok
      # public addresses, written into deploy/.env by `deploy/ngrok_up.sh`. Each is
      # a distinct random host:port (different tunnel), NOT derivable from one host.
      BOX_TEMPORAL_ADDRESS: ${BOX_TEMPORAL_ADDRESS:-}
      BOX_REDIS_URL: ${BOX_REDIS_URL:-}
      BOX_S3_ENDPOINT: ${BOX_S3_ENDPOINT:-}
      VAST_API_KEY: ${VAST_API_KEY:-}
      # Prebaked GPU-box image the pool rents boxes with. Override in .env to point
      # at Docker Hub (faster pulls than GHCR): VAST_IMAGE=docker.io/<user>/splatlab-box:latest
      VAST_IMAGE: ${VAST_IMAGE:-ghcr.io/izmaylovdev/splatlab-box:latest}
      VAST_GPU_NAME: ${VAST_GPU_NAME:-}
      VAST_MAX_PRICE: ${VAST_MAX_PRICE:-0.60}
      SPLATLAB_POOL_MAX_BOXES: ${SPLATLAB_POOL_MAX_BOXES:-3}
      # Boot deadline must cover the on-box torch/gsplat download, which is slow on
      # some hosts (~800MB torch at ~0.5MB/s ≈ 25min). Default generous; a prebaked
      # image would let this drop back down.
      SPLATLAB_POOL_BOOT_DEADLINE: ${SPLATLAB_POOL_BOOT_DEADLINE:-1200}
      # Kill-switch: 1 = rent nothing / drain to zero. Kept ON until the box can
      # actually reach this Mac (connectivity set up). Set to 0 to go live.
      SPLATLAB_POOL_PAUSED: ${SPLATLAB_POOL_PAUSED:-1}
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
