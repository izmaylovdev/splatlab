name: box-image

# Build the prebaked GPU-box image (deploy/Dockerfile.box) for linux/amd64 and
# push it to GHCR. Native amd64 on GitHub's runners avoids emulation and keeps the
# ~7GB push inside GitHub's network. Rented Vast boxes then pull this instead of
# installing torch/gsplat on boot.
#
# Triggers: a change to the image inputs on main, or a manual run.
on:
  push:
    branches: [main]
    paths:
      - deploy/Dockerfile.box
      - requirements.txt
      - .github/workflows/box-image.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.box
          platforms: linux/amd64
          push: true
          tags: ghcr.io/izmaylovdev/splatlab-box:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
